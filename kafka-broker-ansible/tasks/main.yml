- name: Создание каталога
  ansible.builtin.file:
    path: "{{ work_dir }}"
    state: directory
    mode: "0755"

- name: Создание docker-compose.yml
  ansible.builtin.template:
    src: "docker-compose.yml.j2"
    dest: "{{ work_dir }}/docker-compose.yml"
    mode: "0644"

- name: Создание .env
  ansible.builtin.template:
    src: ".env.j2"
    dest: "{{ work_dir }}/.env"
    mode: "0644"

- name: Удаление контейнеров
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ work_dir }}"
    state: absent

- name: Запуск контейнеров
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ work_dir }}"
    state: present
